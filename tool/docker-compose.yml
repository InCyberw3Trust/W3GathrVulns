# ─────────────────────────────────────────────────────────────────────────────
# W3GathrVulns — docker-compose.yml
#
# All secrets and configurable parameters are in .env
# Never commit .env to git (it is in .gitignore)
# Copy .env.example → .env and run ./setup.sh to generate passwords
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Self-signed certificate generation (init container, runs once) ──────────
  certs:
    image: alpine/openssl
    volumes:
      - certs_data:/certs
      - ./certs/generate.sh:/generate.sh:ro
    entrypoint: ["/bin/sh", "/generate.sh"]
    environment:
      SERVER_IP: "${SERVER_IP}"
    restart: "no"

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB:       "${POSTGRES_DB}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      SECRET_KEY:   "${SECRET_KEY}"
      CORS_ORIGINS: "${CORS_ORIGINS}"
      DEBUG:        "${DEBUG:-false}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── React Frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - certs_data:/etc/nginx/certs:ro
    depends_on:
      certs:
        condition: service_completed_successfully
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  certs_data:
